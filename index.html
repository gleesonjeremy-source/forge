<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="theme-color" content="#131110">
<title>FORGE</title>
<style>
  :root{
    --bg:#131110; --surface:#1d1916; --surface2:#272119; --line:#342c23;
    --text:#ece4d8; --muted:#a4947e; --faint:#6f6355;
    --ember:#ff6b2c; --ember2:#ff9d3d; --hot:#ffc46b;
    --good:#8fc978; --warn:#e8b34b; --bad:#e2604f;
    --disp:"Avenir Next Condensed","HelveticaNeue-CondensedBold","Arial Narrow",system-ui,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  /* FORGE commits to a single dark visual world — hot metal on coal */
  :root[data-theme="light"],:root[data-theme="dark"]{color-scheme:dark}
  html{background:var(--bg)}
  body{background:var(--bg);color:var(--text);font-family:var(--body);margin:0;
    -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
  *{box-sizing:border-box}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);background:var(--surface2);
    border:1px solid var(--line);border-radius:8px;padding:10px 12px;width:100%}
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--ember);outline-offset:1px}
  #wrap{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

  /* header */
  #hdr{display:flex;align-items:baseline;justify-content:space-between;padding:14px 18px 8px}
  .wordmark{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.14em;
    background:linear-gradient(100deg,var(--ember) 20%,var(--hot) 80%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #hdr .date{color:var(--faint);font-size:13px;letter-spacing:.04em}
  #hdr .gear{color:var(--muted);font-size:13px;letter-spacing:.08em;padding:4px 2px}

  main{flex:1;padding:4px 16px 110px}

  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(19,17,16,.96);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:40}
  nav .row{max-width:520px;margin:0 auto;display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0 5px;
    color:var(--faint);font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.12em}
  nav button.on{color:var(--ember)}
  nav svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  /* primitives */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:10px 0}
  .eyebrow{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
  h2.big{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.02em;margin:2px 0 4px;text-transform:uppercase;text-wrap:balance}
  .num{font-family:var(--disp);font-weight:700;font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .small{font-size:13px}
  .row{display:flex;align-items:center;gap:10px}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .btn{display:block;width:100%;text-align:center;font-family:var(--disp);font-weight:700;font-size:18px;
    letter-spacing:.1em;text-transform:uppercase;padding:15px;border-radius:12px;
    background:linear-gradient(120deg,var(--ember),#ff8438);color:#1a0d05}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
  .btn.sm{font-size:14px;padding:10px}
  .chip{display:inline-block;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface2);color:var(--muted);font-size:13px}
  .chip.on{border-color:var(--ember);color:var(--hot);background:rgba(255,107,44,.12)}
  .pill{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.1em;padding:3px 9px;border-radius:999px}
  .pill.good{background:rgba(143,201,120,.15);color:var(--good)}
  .pill.warn{background:rgba(232,179,75,.15);color:var(--warn)}
  .pill.bad{background:rgba(226,96,79,.15);color:var(--bad)}
  .bar{height:7px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:6px}
  .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ember),var(--hot))}
  .bar i.over{background:var(--good)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .divline{border:none;border-top:1px solid var(--line);margin:12px 0}
  label.f{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}

  /* recovery ring */
  .ring{position:relative;width:86px;height:86px;flex:none}
  .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px}

  /* gym mode */
  .gym-w{font-family:var(--disp);font-weight:700;font-size:64px;line-height:1;letter-spacing:.01em}
  .gym-unit{font-size:20px;color:var(--muted);letter-spacing:.08em}
  .step{width:56px;height:56px;flex:none;border-radius:14px;background:var(--surface2);border:1px solid var(--line);
    font-family:var(--disp);font-weight:700;font-size:24px;color:var(--text)}
  .step:active{background:var(--line)}
  .setdots{display:flex;gap:7px;margin:4px 0 10px}
  .setdots i{width:11px;height:11px;border-radius:99px;background:var(--surface2);border:1px solid var(--line)}
  .setdots i.done{background:var(--ember);border-color:var(--ember)}
  .setdots i.cur{border-color:var(--hot)}

  /* rest timer */
  #rest{position:fixed;left:0;right:0;bottom:0;z-index:60;background:#241b12;border-top:2px solid var(--ember);display:none}
  #rest .inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:14px;
    padding:12px 18px calc(14px + env(safe-area-inset-bottom))}
  #rest .t{font-family:var(--disp);font-weight:700;font-size:42px;font-variant-numeric:tabular-nums;color:var(--hot)}

  /* sheet */
  #shade{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:none}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:71;display:none;background:var(--surface);
    border-top:1px solid var(--line);border-radius:18px 18px 0 0;max-height:82dvh;overflow-y:auto}
  #sheet .inner{max-width:520px;margin:0 auto;padding:18px 18px calc(26px + env(safe-area-inset-bottom))}

  #storewarn{display:none;position:fixed;top:0;left:0;right:0;z-index:95;background:var(--bad);color:#1a0505;
    font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.06em;text-align:center;
    padding:10px 16px calc(10px + env(safe-area-inset-top))}
  #toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:90;background:var(--surface2);
    border:1px solid var(--ember);color:var(--text);padding:10px 18px;border-radius:99px;font-size:14px;
    display:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.5)}

  .exrow{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line)}
  .exrow:last-child{border-bottom:none}
  @keyframes flashrow{0%{background:rgba(255,107,44,.4)}100%{background:transparent}}
  .flash{animation:flashrow 1.6s ease-out;border-radius:8px}
  .traybar{position:fixed;left:0;right:0;bottom:calc(58px + env(safe-area-inset-bottom));z-index:35;
    background:rgba(19,17,16,.97);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-top:1px solid var(--hot)}
  .traybar .tb-in{max-width:520px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:9px}
  input[type=range]{padding:0;height:34px;accent-color:var(--ember);background:none;border:none}
  .slider-val{font-family:var(--disp);font-weight:700;font-size:18px;width:34px;text-align:right}
  svg.chart{display:block;width:100%;height:auto}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<div id="wrap">
  <div id="hdr">
    <span class="wordmark">FORGE</span>
    <span class="date" id="hdrDate"></span>
    <button class="gear" onclick="app.settings()">SET&#8202;UP</button>
  </div>
  <main id="view"></main>
</div>

<nav><div class="row" id="tabs"></div></nav>

<div id="rest"><div class="inner">
  <div><div class="eyebrow">Rest</div><div class="t" id="restT">1:30</div></div>
  <div style="flex:1"></div>
  <button class="chip" onclick="app.restAdd(30)">+30s</button>
  <button class="btn sm" style="width:auto;padding:10px 22px" onclick="app.restSkip()">GO</button>
</div></div>

<div id="storewarn" onclick="this.style.display='none'"></div>
<div id="shade" onclick="app.closeSheet()"></div>
<div id="sheet"><div class="inner" id="sheetBody"></div></div>
<div id="toast"></div>

<script>
'use strict';
/* ---------- exercise library ---------- */
/* eq: bb = barbell/bench, db = dumbbell, mc = machine/cable, bw = bodyweight.
   Drives the equipment-limited templates and the Shuffle generator. */
const EX = {
 "Bench Press":{g:"chest",eq:"bb",w:175,r:8,s:4,inc:5,sh:1,alt:["Dumbbell Bench Press","Machine Chest Press","Smith Machine Press","Push-Up"]},
 "Dumbbell Bench Press":{g:"chest",eq:"db",w:35,r:10,s:3,inc:5,db:1,alt:["Bench Press","Machine Chest Press","Push-Up"]},
 "Incline Dumbbell Press":{g:"chest",eq:"db",w:35,r:10,s:3,inc:5,db:1,alt:["Machine Chest Press","Push-Up","Cable Fly"]},

 "Cable Fly":{g:"chest",eq:"mc",w:25,r:12,s:3,inc:5,alt:["Incline Dumbbell Press","Push-Up"]},
 "Push-Up":{g:"chest",eq:"bw",w:0,r:15,s:3,inc:0,bw:1,alt:["Machine Chest Press"]},
 "Dip":{g:"chest",eq:"bw",w:0,r:10,s:3,inc:0,bw:1,sh:1,alt:["Triceps Pushdown","Machine Chest Press"]},
 "Dumbbell Shoulder Press":{g:"shoulders",eq:"db",w:45,r:8,s:3,inc:5,db:1,sh:1,oh:1,alt:["Machine Shoulder Press","Lateral Raise"]},
 "Machine Shoulder Press":{g:"shoulders",eq:"mc",w:90,r:10,s:3,inc:10,sh:1,oh:1,alt:["Dumbbell Shoulder Press","Lateral Raise"]},
 "Lateral Raise":{g:"shoulders",eq:"db",w:20,r:12,s:3,inc:5,db:1,alt:["Cable Lateral Raise"]},
 "Cable Lateral Raise":{g:"shoulders",eq:"mc",w:15,r:12,s:3,inc:5,alt:["Lateral Raise"]},
 "Rear Delt Fly":{g:"shoulders",eq:"db",w:20,r:12,s:3,inc:5,db:1,alt:["Face Pull"]},
 "Face Pull":{g:"shoulders",eq:"mc",w:40,r:15,s:3,inc:5,alt:["Rear Delt Fly"]},
 "Pull-Up":{g:"back",eq:"bw",w:0,r:8,s:3,inc:0,bw:1,alt:["Lat Pulldown","Inverted Row","Seated Cable Row"]},
 "Lat Pulldown":{g:"back",eq:"mc",w:120,r:10,s:3,inc:10,alt:["Pull-Up","Seated Cable Row"]},
 "Barbell Row":{g:"back",eq:"bb",w:115,r:10,s:3,inc:5,alt:["Seated Cable Row","Dumbbell Row"]},
 "Seated Cable Row":{g:"back",eq:"mc",w:120,r:10,s:3,inc:10,alt:["Barbell Row","Dumbbell Row"]},
 "Dumbbell Row":{g:"back",eq:"db",w:45,r:10,s:3,inc:5,db:1,alt:["Seated Cable Row","Barbell Row"]},
 "Inverted Row":{g:"back",eq:"bw",w:0,r:12,s:3,inc:0,bw:1,alt:["Dumbbell Row","Seated Cable Row"]},
 "Dumbbell Curl":{g:"arms",eq:"db",w:30,r:10,s:3,inc:5,db:1,alt:["Hammer Curl","EZ Bar Curl"]},
 "Hammer Curl":{g:"arms",eq:"db",w:30,r:10,s:3,inc:5,db:1,alt:["Dumbbell Curl"]},
 "EZ Bar Curl":{g:"arms",eq:"bb",w:60,r:10,s:3,inc:5,alt:["Dumbbell Curl"]},
 "Triceps Pushdown":{g:"arms",eq:"mc",w:50,r:12,s:3,inc:5,alt:["Overhead Triceps Extension","Skull Crusher"]},
 "Overhead Triceps Extension":{g:"arms",eq:"db",w:30,r:12,s:3,inc:5,db:1,sh:1,alt:["Triceps Pushdown"]},
 "Skull Crusher":{g:"arms",eq:"bb",w:50,r:10,s:3,inc:5,alt:["Triceps Pushdown"]},
 "Barbell Squat":{g:"legs",eq:"bb",w:135,r:10,s:3,inc:10,ank:1,alt:["Leg Press","Goblet Squat","Romanian Deadlift","Hack Squat"]},
 "Hack Squat":{g:"legs",eq:"mc",w:180,r:10,s:3,inc:10,ank:1,alt:["Leg Press","Goblet Squat"]},
 "Leg Press":{g:"legs",eq:"mc",w:270,r:10,s:3,inc:20,alt:["Goblet Squat","Barbell Squat"]},
 "Goblet Squat":{g:"legs",eq:"db",w:50,r:10,s:3,inc:5,db:1,alt:["Leg Press","Split Squat"]},
 "Split Squat":{g:"legs",eq:"db",w:25,r:10,s:3,inc:5,db:1,alt:["Goblet Squat","Leg Press"]},
 "Bodyweight Squat":{g:"legs",eq:"bw",w:0,r:20,s:3,inc:0,bw:1,alt:["Goblet Squat","Split Squat"]},
 "Glute Bridge":{g:"legs",eq:"bw",w:0,r:15,s:3,inc:0,bw:1,alt:["Romanian Deadlift","Leg Curl"]},
 "Romanian Deadlift":{g:"legs",eq:"bb",w:135,r:10,s:3,inc:10,alt:["Deadlift","Leg Curl","Glute Bridge"]},
 "Deadlift":{g:"legs",eq:"bb",w:135,r:10,s:3,inc:10,ank:1,alt:["Romanian Deadlift","Leg Press"]},
 "Leg Curl":{g:"legs",eq:"mc",w:90,r:12,s:3,inc:10,alt:["Romanian Deadlift","Glute Bridge"]},
 "Leg Extension":{g:"legs",eq:"mc",w:90,r:12,s:3,inc:10,alt:["Leg Press"]},
 "Calf Raise":{g:"legs",eq:"mc",w:135,r:15,s:3,inc:10,alt:["Leg Press"]},
 "Hanging Leg Raise":{g:"abs",eq:"bw",w:0,r:12,s:3,inc:0,bw:1,alt:["Decline Sit-Up","Cable Crunch"]},
 "Cable Crunch":{g:"abs",eq:"mc",w:60,r:15,s:3,inc:5,alt:["Ab Wheel","Decline Sit-Up"]},
 "Ab Wheel":{g:"abs",eq:"bw",w:0,r:10,s:3,inc:0,bw:1,alt:["Cable Crunch","Plank (sec)"]},
 "Decline Sit-Up":{g:"abs",eq:"bw",w:0,r:15,s:3,inc:0,bw:1,alt:["Cable Crunch"]},
 "Plank (sec)":{g:"abs",eq:"bw",w:0,r:60,s:3,inc:0,bw:1,alt:["Ab Wheel"]}
};
/* FORGE-3: full-body A/B/C — every muscle 2-3x/week on Tue/Wed/Thu.
   Ankle-safe leg choices; shoulders strengthened via laterals/face pulls/rear delts
   weekly, overhead pressing only as an occasional swap. */
const TEMPLATES = {
 "CHEST + TRI":["Bench Press","Incline Dumbbell Press","Cable Fly","Lateral Raise","Triceps Pushdown","Skull Crusher"],
 "BACK + BI":["Pull-Up","Lat Pulldown","Seated Cable Row","Face Pull","Dumbbell Curl","Hammer Curl"],
 "FORGE A":["Bench Press","Leg Press","Seated Cable Row","Lateral Raise","Triceps Pushdown","Hanging Leg Raise"],
 "FORGE B":["Pull-Up","Romanian Deadlift","Incline Dumbbell Press","Face Pull","Dumbbell Curl","Cable Crunch"],
 "FORGE C":["Goblet Squat","Machine Chest Press","Lat Pulldown","Leg Curl","Rear Delt Fly","Ab Wheel"],
 "DUMBBELLS ONLY":["Dumbbell Bench Press","Goblet Squat","Dumbbell Row","Lateral Raise","Hammer Curl","Plank (sec)"],
 "MACHINES ONLY":["Machine Chest Press","Leg Press","Lat Pulldown","Cable Lateral Raise","Triceps Pushdown","Cable Crunch"],
 "BODYWEIGHT":["Push-Up","Pull-Up","Bodyweight Squat","Inverted Row","Glute Bridge","Hanging Leg Raise"],
 CIRCUIT:["Goblet Squat","Push-Up","Dumbbell Row","Lateral Raise","Glute Bridge","Ab Wheel"],
 PUSH:["Bench Press","Incline Dumbbell Press","Machine Chest Press","Lateral Raise","Triceps Pushdown","Face Pull"],
 PULL:["Pull-Up","Lat Pulldown","Seated Cable Row","Rear Delt Fly","Face Pull","Dumbbell Curl"],
 LEGS:["Leg Press","Goblet Squat","Romanian Deadlift","Leg Curl","Calf Raise","Hanging Leg Raise"],
 SHOULDERS:["Dumbbell Shoulder Press","Lateral Raise","Rear Delt Fly","Face Pull","Machine Shoulder Press"],
 ARMS:["EZ Bar Curl","Hammer Curl","Dumbbell Curl","Triceps Pushdown","Skull Crusher","Dip"],
 ABS:["Hanging Leg Raise","Cable Crunch","Ab Wheel","Plank (sec)"]
};
// CIRCUIT keeps you moving: 45s rests instead of your default
const REST_OVERRIDE={CIRCUIT:45};
/* ---------- FORGE SPLIT: adaptive body-part rotation ----------
   His real training is a 3-day split. The adaptive layer watches the last
   7 days of done sets per muscle group; when a day got skipped, the next
   session automatically folds in one patch exercise per neglected group
   (max 2) so nothing gets a zero week. */
const SPLIT_ROT=["CHEST + TRI","BACK + BI","LEGS"];
const SPLIT_GROUPS={"CHEST + TRI":["chest","arms","shoulders"],"BACK + BI":["back","arms","shoulders"],"LEGS":["legs","abs"]};
const PATCH_ORDER=["shoulders","chest","back","legs","abs"];
const PATCH_EX={shoulders:"Lateral Raise",chest:"Machine Chest Press",back:"Lat Pulldown",legs:"Leg Press",abs:"Cable Crunch"};
function groupSets7d(){
  const cut=daysAgo(7); const out={chest:0,back:0,legs:0,shoulders:0,arms:0,abs:0};
  for(const w of S.workouts){ if(w.type!=="lift"||w.date<=cut)continue;
    for(const e of (w.exercises||[])){ const g=EX[e.name]&&EX[e.name].g;
      if(g)out[g]+=e.sets.filter(s=>s.done).length; } }
  return out;
}
function adaptPatches(tpl){
  if(!SPLIT_GROUPS[tpl]) return [];
  if(!S.workouts.some(w=>w.type==="lift"&&w.date>daysAgo(10))) return []; // no history yet — nothing to patch
  const own=SPLIT_GROUPS[tpl]; const gs=groupSets7d();
  return PATCH_ORDER.filter(g=>!own.includes(g)&&gs[g]===0).slice(0,2)
    .map(g=>({g,ex:PATCH_EX[g]}));
}
/* Component foods for the plate builder. Macros are the MEDIUM portion;
   S = ×0.7, L = ×1.4. `anchor` = no-scale portion guide. `unit` items log
   by count instead of size. plant/fish flags feed the health counters. */
const COMPONENTS=[
 {name:"Egg",unit:"egg",cat:"pro",p:6,c:0,f:5,cal:70},
 {name:"Protein Shake",drink:1,cat:"pro",p:30,c:5,f:3,cal:170},
 {name:"Protein Bar",cat:"pro",p:20,c:23,f:8,cal:220},
 {name:"Greek Yogurt",sizes:1,cat:"pro",p:17,c:9,f:4,cal:150,anchor:"M = single-serve cup"},
 {name:"Fresh Fish",sizes:1,fish:1,cat:"pro",p:38,c:0,f:6,cal:220,anchor:"M = palm-size fillet ≈ 7 oz"},
 {name:"Chicken Breast",sizes:1,cat:"pro",p:38,c:0,f:4,cal:190,anchor:"M = palm ≈ 6 oz"},
 {name:"Steak",sizes:1,cat:"pro",p:40,c:0,f:16,cal:320,anchor:"M = palm ≈ 6 oz"},
 {name:"White Rice",sizes:1,cat:"carb",p:4,c:45,f:0,cal:205,anchor:"M = fist ≈ 1 cup"},
 {name:"Sweet Potato",sizes:1,plant:1,cat:"carb",p:2,c:27,f:0,cal:115,anchor:"M = fist ≈ 1 medium"},
 {name:"Oatmeal",sizes:1,cat:"carb",p:6,c:30,f:3,cal:170,anchor:"M = fist ≈ 1 cup cooked"},
 {name:"Overnight Oats",sizes:1,cat:"carb",p:12,c:48,f:9,cal:330,anchor:"M = 1 jar"},
 {name:"Sourdough Slice",unit:"slice",cat:"carb",p:4,c:22,f:1,cal:115},
 {name:"Grilled Veggies",sizes:1,plant:1,cat:"plant",p:3,c:12,f:5,cal:100,anchor:"M = two cupped hands"},
 {name:"Baked Broccoli",sizes:1,plant:1,cat:"plant",p:4,c:10,f:4,cal:90,anchor:"M = two cupped hands"},
 {name:"Salad Greens",sizes:1,plant:1,cat:"plant",p:2,c:6,f:0,cal:35,anchor:"M = big bowl"},
 {name:"Fruit / Berries",sizes:1,plant:1,cat:"plant",p:1,c:20,f:0,cal:80,anchor:"M = fist ≈ 1 cup"},
 {name:"Avocado",sizes:1,plant:1,cat:"fat",p:1,c:6,f:11,cal:120,anchor:"M = half"},
 {name:"Raw Nuts / Mix",sizes:1,cat:"fat",p:5,c:6,f:17,cal:190,anchor:"M = cupped palm ≈ 1 oz"},
 {name:"Brazil Nut",unit:"nut",cat:"fat",p:1,c:1,f:4,cal:33},
 {name:"Peanut Butter",sizes:1,cat:"fat",p:7,c:8,f:16,cal:190,anchor:"M = 2 tbsp"},
 {name:"Butter / Olive Oil",sizes:1,cat:"fat",p:0,c:0,f:12,cal:110,anchor:"M = thumb ≈ 1 tbsp"},
 {name:"Coffee (black)",drink:1,cat:"drink",p:0,c:0,f:0,cal:5},
 {name:"Coconut Water",sizes:1,drink:1,cat:"drink",p:0,c:13,f:0,cal:55,anchor:"M = 12 oz"},
 {name:"Fresh Juice",sizes:1,plant:1,drink:1,cat:"drink",p:1,c:28,f:0,cal:120,anchor:"M = 12 oz glass"},
 {name:"Smoothie",sizes:1,plant:1,drink:1,cat:"drink",p:6,c:40,f:4,cal:220,anchor:"M = 16 oz"},
 {name:"Dark Chocolate",unit:"square",cat:"treat",p:1,c:5,f:4,cal:60},
 {name:"Honey",sizes:1,cat:"treat",p:0,c:17,f:0,cal:64,anchor:"M = 1 tbsp drizzle"}

  if(bikeOld) msgs.push({tone:"warn",title:"Conditioning",body:"No bike ride logged in 10+ days. One 5–6 mile ride keeps the engine without costing strength."});
  // stall
  const bod=S.body.filter(b=>b.weight);
  if(bod.length>=3){ const a=bod[bod.length-3],b=bod[bod.length-1];
    const span=(new Date(b.date)-new Date(a.date))/864e5;
    if(span>=21&&Math.abs(b.weight-a.weight)<1.5){
      const wa=bod.filter(x=>x.waist); const waistFlat=wa.length>=2&&(wa[wa.length-1].waist>=wa[wa.length-2].waist);
      if(waistFlat) msgs.push({tone:"warn",title:"Progress stalled",body:"Weight and waist flat 3+ weeks. Trim ~150 calories or add one bike ride per week."}); } }
  const st=streak();
  if(st>=2) msgs.push({tone:"good",title:st+"-week streak",body:"Consistency is the whole game. Keep the chain alive."});
  const dow=new Date().getDay();
  if(dow===0||dow===6) msgs.push({tone:"warn",title:"Weekly review is in",body:"Weight, waist, strength and eating trends for the week — Coach tab, bottom. One nudge, applied in one tap."});
  // backup insurance: nag when the last export is over a week old
  if(!S.meta.lastExport||S.meta.lastExport<daysAgo(7))
    msgs.push({tone:"warn",title:"Back up your data",body:"No export in the last week. SET UP → EXPORT JSON — 5 seconds of insurance against a phone dying or storage acting up."});
  return msgs;
}

/* ---------- weekly review (recomp autopilot) ----------
   Steady-recomp rules: stay near maintenance, 185g protein, and steer by trend:
   strength up + waist down = winning; scale climbing fast = trim; sinking fast
   while strength drops = add. Nudges are ±150 cal, never crash moves. */
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function weeklyReview(){
  const R={};
  // weight trend: avg of entries in last 7d vs prior 7d
  const win=(a,b)=>S.body.filter(x=>x.weight&&x.date>daysAgo(a)&&x.date<=daysAgo(b));
  const thisW=win(7,0),lastW=win(14,7);
  const avg=a=>a.length?a.reduce((s,x)=>s+x.weight,0)/a.length:null;
  R.wNow=avg(thisW); R.wPrev=avg(lastW);
  R.wDelta=(R.wNow!=null&&R.wPrev!=null)?+(R.wNow-R.wPrev).toFixed(1):null;
  // waist trend: last two measurements
  const wa=S.body.filter(x=>x.waist);
  R.waistNow=wa.length?wa[wa.length-1].waist:null;
  R.waistPrev=wa.length>1?wa[wa.length-2].waist:null;
  // strength trend: per-exercise best e1RM, last 14d vs prior 14d
  const best={};
  for(const w of S.workouts){ if(w.type!=="lift")continue;
    const bucket=w.date>daysAgo(14)?"now":(w.date>daysAgo(28)?"prev":null); if(!bucket)continue;
    for(const e of (w.exercises||[])){ if(EX[e.name]&&EX[e.name].bw)continue;
      for(const s of e.sets){ if(!s.done)continue; const v=(+s.w||0)*(1+(+s.r||0)/30);
        best[e.name]=best[e.name]||{}; if(!best[e.name][bucket]||v>best[e.name][bucket]) best[e.name][bucket]=v; } } }
  R.strUp=0;R.strDown=0;R.strMoves=[];
  for(const n in best){ const b=best[n]; if(b.now&&b.prev){
    if(b.now>b.prev+1){R.strUp++;R.strMoves.push(n+" ↑");}
    else if(b.now<b.prev-1){R.strDown++;R.strMoves.push(n+" ↓");} } }
  // nutrition: last 7 days that have logged meals
  const days=[];for(let i=0;i<7;i++){const d=daysAgo(i);if(S.log[d]&&S.log[d].meals.length)days.push(d);}
  R.foodDays=days.length;
  R.avgP=days.length?Math.round(days.reduce((s,d)=>s+totals(d).p,0)/days.length):0;
  R.avgCal=days.length?Math.round(days.reduce((s,d)=>s+totals(d).cal,0)/days.length):0;
  R.pHit=days.filter(d=>totals(d).p>=S.profile.proteinFloor).length;
  R.mindDays=0; for(let i=0;i<7;i++){ const l=S.log[daysAgo(i)]; if(l&&(l.mind||[]).length)R.mindDays++; }
  R.avgPlants=days.length?+(days.reduce((s,d)=>s+totals(d).plants,0)/days.length).toFixed(1):0;
  R.avgDrink=days.length?Math.round(days.reduce((s,d)=>s+totals(d).dcal,0)/days.length):0;
  R.fishWk=fishWeek();
  const freq={};for(let i=0;i<14;i++){const l=S.log[daysAgo(i)];if(l)for(const m of l.meals)freq[m.name]=(freq[m.name]||0)+1;}
  R.topFoods=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  R.lifts=S.workouts.filter(w=>w.type==="lift"&&w.date>daysAgo(7)).length;
  // verdict
  const strengthUp=R.strUp>=R.strDown;
  if(R.wNow==null||R.wPrev==null)
    R.verdict={tone:"warn",title:"Need more weigh-ins",body:"Log weight 2–3 mornings a week and waist once a week. The autopilot steers off those two numbers.",nudge:0};
  else if(R.waistPrev!=null&&R.waistNow<R.waistPrev&&strengthUp)
    R.verdict={tone:"good",title:"Textbook recomp — stay the course",body:"Waist down, strength holding or climbing, scale steady. This is exactly the 6-pack path. Change nothing.",nudge:0};
  else if(R.wDelta>0.75)
    R.verdict={tone:"warn",title:"Scale climbing fast: "+(R.wDelta>0?"+":"")+R.wDelta+" lb",body:"Some of that is muscle, but not at this rate. Trim ~150 calories/day — one smaller carb portion at dinner.",nudge:-150};
  else if(R.wDelta<-1&&!strengthUp)
    R.verdict={tone:"bad",title:"Dropping too fast, strength sliding",body:"Losing over 1 lb/week with lifts going down risks the muscle goal. Add ~150 calories/day, protein first.",nudge:150};
  else if(R.waistPrev!=null&&R.waistNow>=R.waistPrev&&Math.abs(R.wDelta)<0.5&&!strengthUp)
    R.verdict={tone:"warn",title:"Stalled — waist and strength both flat",body:"Three options, pick one: trim 150 calories, add one bike ride, or add one hard set to each big lift. Not all three.",nudge:-150};
  else
    R.verdict={tone:"good",title:"On track",body:"Weight steady"+(strengthUp?", strength trending up":"")+". Keep protein at target and let the weeks stack.",nudge:0};
  return R;
}

   <button class="btn ghost" style="margin-top:8px" onclick="app.rollWorkout('bw')">BODYWEIGHT ONLY</button>`);
},
rollWorkout(mode){
  const okEq=e=>mode==="gym"?true:mode==="db"?(e.eq==="db"||e.eq==="bw"):mode==="mc"?(e.eq==="mc"||e.eq==="bw"):e.eq==="bw";
  const pool=g=>Object.keys(EX).filter(n=>{const e=EX[n];return e.g===g&&!e.oh&&!e.ank&&okEq(e);});
  const pick=g=>{const p=pool(g);return p.length?p[Math.floor(Math.random()*p.length)]:null;};
  const names=["chest","back","legs","shoulders","arms","abs"].map(pick).filter(Boolean);
  if(names.length<4){toast("Not enough exercises for that filter");return;}
  this.beginSession("SHUFFLE",names);
  toast("Rolled — swap any exercise you don't like");

startCustom(){

},
beginCustom(){

  this.beginSession("CUSTOM",names);

/* ---------- GYM MODE ---------- */
vGym(){
  const A=S.active,ex=A.exercises[A.exIdx],lib=EX[ex.name]||{};
  const cur=ex.sets.findIndex(s=>!s.done);
  const set=cur<0?ex.sets[ex.sets.length-1]:ex.sets[cur];
  const next=A.exercises[A.exIdx+1];
  const hm=histMax(ex.name);
  return `
  <div class="spread"><span class="eyebrow">${esc(A.template)} · exercise ${A.exIdx+1}/${A.exercises.length}</span>
    <button class="chip" onclick="app.finishWorkout()">Finish</button></div>
  <h2 class="big" style="font-size:34px">${esc(ex.name)}</h2>
  <div class="setdots">${ex.sets.map((s,i)=>`<i class="${s.done?"done":i===cur?"cur":""}"></i>`).join("")}</div>
  <div class="small muted">Set ${cur<0?ex.sets.length:cur+1} of ${ex.sets.length}
    ${ex.note?` · <span style="color:var(--hot)">${esc(ex.note)}</span>`:""}
    ${hm.max?` · best ${hm.max} lb`:""}</div>

  <div class="card" style="padding:20px 16px">
    ${lib.bw?`<div class="eyebrow">Bodyweight${lib.name==="Plank (sec)"?"":""}</div>`:`
    <div class="eyebrow">Weight ${lib.db?"(per dumbbell)":""}</div>
    <div class="spread" style="margin:8px 0 16px">
      <button class="step" onclick="app.bump('w',-${lib.inc||5})">−</button>
      <div style="text-align:center"><span class="gym-w" id="gw" onclick="app.typeVal('w')">${set.w}</span> <span class="gym-unit">lb</span></div>
      <button class="step" onclick="app.bump('w',${lib.inc||5})">+</button>
    </div>`}
    <div class="eyebrow">${ex.name==="Plank (sec)"?"Seconds":"Reps"}</div>
    <div class="spread" style="margin:8px 0 4px">
      <button class="step" onclick="app.bump('r',-1)">−</button>
      <div style="text-align:center"><span class="gym-w" id="gr" onclick="app.typeVal('r')">${set.r}</span></div>
      <button class="step" onclick="app.bump('r',1)">+</button>
    </div>
  </div>
  <button class="btn" style="padding:20px;font-size:22px" onclick="app.completeSet()">COMPLETE SET</button>
  <div class="grid2" style="margin-top:10px">
    <button class="btn ghost sm" onclick="app.swapSheet()">SWAP EXERCISE</button>
    <button class="btn ghost sm" onclick="app.addSet()">+ ADD SET</button>
    <button class="btn ghost sm" onclick="app.prevEx()" ${A.exIdx===0?"disabled style='opacity:.4'":""}>‹ PREV</button>
    <button class="btn ghost sm" onclick="app.nextEx()">${A.exIdx>=A.exercises.length-1?"LAST ONE":"SKIP ›"}</button>
  </div>
  ${next?`<div class="small faint" style="margin-top:12px;text-align:center">Next: ${esc(next.name)}</div>`:""}`;
},
curSet(){ const ex=S.active.exercises[S.active.exIdx]; const i=ex.sets.findIndex(s=>!s.done);
  return ex.sets[i<0?ex.sets.length-1:i]; },
bump(k,d){ const s=this.curSet(); s[k]=Math.max(0,(+s[k]||0)+d); save();
  document.getElementById(k==="w"?"gw":"gr").textContent=s[k]; },
typeVal(k){ const s=this.curSet(); const v=prompt(k==="w"?"Weight (lb):":"Reps:",s[k]);
  if(v!==null&&v!==""&&!isNaN(+v)){ s[k]=Math.max(0,+v); save(); this.render(); } },
completeSet(){
  const A=S.active,ex=A.exercises[A.exIdx];
  const i=ex.sets.findIndex(s=>!s.done); if(i<0){ this.nextEx(); return; }
  const s=ex.sets[i]; s.done=true;
  const lib=EX[ex.name]||{};
  if(!lib.bw){ const hm=histMax(ex.name); if(+s.w>hm.max&&hm.max>0) toast("🔥 PR — "+s.w+" lb "+ex.name); }
  save();
  const last=i===ex.sets.length-1;
  if(last&&A.exIdx>=A.exercises.length-1){ this.render(); this.finishWorkout(); return; }
  if(last) A.exIdx++;
  save(); this.render(); this.startRest();
},
addSet(){ const ex=S.active.exercises[S.active.exIdx]; const l=ex.sets[ex.sets.length-1];
  ex.sets.push({w:l.w,r:l.r,done:false}); save(); this.render(); },
prevEx(){ if(S.active.exIdx>0){S.active.exIdx--;save();this.render();} },
nextEx(){ const A=S.active; if(A.exIdx<A.exercises.length-1){A.exIdx++;save();this.render();} else this.finishWorkout(); },
swapSheet(){
  const A=S.active,ex=A.exercises[A.exIdx],lib=EX[ex.name]||{alt:[]};
  const alts=(lib.alt||[]).filter(a=>EX[a]);
  openSheet(`<div class="eyebrow">Equipment taken?</div><h2 class="big" style="font-size:24px">Swap ${esc(ex.name)}</h2>
   ${alts.map(a=>{const r=recommend(a);return `<button class="card" style="width:100%;text-align:left" onclick="app.doSwap('${esc(a)}')">
     <div class="spread"><div class="num" style="font-size:18px">${esc(a)}</div>
     <div class="muted small">${EX[a].bw?"BW":r.w+" lb"} × ${r.r}</div></div></button>`;}).join("")}
   <div class="small faint" style="margin-top:8px">Load auto-adjusted from your history on each alternative.</div>`);
},
doSwap(name){
  const A=S.active; const r=recommend(name);
  const old=A.exercises[A.exIdx];
  const doneSets=old.sets.filter(s=>s.done);
  A.exercises[A.exIdx]={name,note:r.note,sets:[...doneSets.length?[]:[],...Array.from({length:Math.max(2,r.s)},()=>({w:r.w,r:r.r,done:false}))]};
  if(doneSets.length){ // keep completed work as its own entry
    A.exercises.splice(A.exIdx,0,{name:old.name,note:old.note,sets:doneSets}); A.exIdx++;
  }
  save(); this.closeSheet(); this.render(); toast("Swapped to "+name);
},
finishWorkout(){
  const A=S.active; if(!A) return;
  const kept=A.exercises.map(e=>({name:e.name,sets:e.sets.filter(s=>s.done)})).filter(e=>e.sets.length);
  if(!kept.length){ if(confirm("No sets completed — discard workout?")){ S.active=null; save(); this.render(); } return; }
  if(!confirm("Finish workout?")) return;
  const mins=Math.round((Date.now()-A.start)/60000);
  S.workouts.push({id:A.id,type:"lift",date:A.date,template:A.template,exercises:kept,mins});
  S.active=null; this.restStop(); save();
  const vol=kept.reduce((a,e)=>a+e.sets.reduce((x,s)=>x+(+s.w||0)*(+s.r||0),0),0);
  const sets=kept.reduce((a,e)=>a+e.sets.length,0);
  this.render();
  openSheet(`<div class="eyebrow">Mission complete</div><h2 class="big">${esc(A.template)} done</h2>
    <div class="grid2">
      <div class="card"><div class="eyebrow">Sets</div><div class="num" style="font-size:28px">${sets}</div></div>
      <div class="card"><div class="eyebrow">Volume</div><div class="num" style="font-size:28px">${(vol/1000).toFixed(1)}k<span class="small muted"> lb</span></div></div>
      <div class="card"><div class="eyebrow">Time</div><div class="num" style="font-size:28px">${mins}<span class="small muted"> min</span></div></div>
      <div class="card"><div class="eyebrow">Streak</div><div class="num" style="font-size:28px">${streak()} wk</div></div>
    </div>
    <div class="small muted" style="margin-top:6px">Now feed it — ${Math.max(0,S.profile.proteinFloor-totals().p)}g protein still to go to the zone.</div>
    <button class="btn" style="margin-top:14px" onclick="app.closeSheet()">DONE</button>`);
},
viewWorkout(id){

/* ---------- rest timer ---------- */
startRest(){ this.restLeft=(S.active&&S.active.rest)||S.profile.restSec||90; this.restTick(true); },
restTick(first){
  const el=document.getElementById("rest");
  if(this.restLeft<=0){ this.restStop(); this.beep(); return; }
  el.style.display="block";
  document.getElementById("restT").textContent=Math.floor(this.restLeft/60)+":"+String(this.restLeft%60).padStart(2,"0");
  if(first&&this.restTimer)clearInterval(this.restTimer);
  if(first)this.restTimer=setInterval(()=>{this.restLeft--;this.restTick(false);},1000);
},
restAdd(s){ this.restLeft+=s; },
restSkip(){ this.restStop(); },
restStop(){ if(this.restTimer)clearInterval(this.restTimer); this.restTimer=null;
  const el=document.getElementById("rest"); if(el)el.style.display="none"; },
beep(){ try{ const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
  o.frequency.value=880; g.gain.setValueAtTime(.25,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5); o.start(); o.stop(ctx.currentTime+.5);}catch(e){} },

logEntry(e){ e.time=e.time||new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});

/* recent + saved meals: saved plates first, then unique recent entries */
recentMeals(){
  const out=S.meals.map((m,idx)=>{const t=m.items.reduce((a,it)=>{const e=compEntry(it);
      if(e){a.p+=e.p;a.c+=e.c;a.f+=e.f;a.cal+=e.cal;a.plants+=e.plants;a.fish+=e.fish;a.dcal+=e.dcal||0;}return a;},
      {p:0,c:0,f:0,cal:0,plants:0,fish:0,dcal:0});
    return {kind:"plate",idx,label:m.name,...t};});
  const seen=new Set(S.meals.map(m=>m.name));
  for(let i=0;i<10&&out.length<8;i++){ const l=S.log[daysAgo(i)]; if(!l)continue;
    for(const m of [...l.meals].reverse()){
      if(seen.has(m.name)||out.length>=8)continue; seen.add(m.name);
      if(compFind(m.name))continue; // single quick-adds don't need echo chips
      out.push({kind:"echo",label:m.name,p:m.p,c:m.c,f:m.f,cal:m.cal,plants:m.plants||0,fish:m.fish||0,dcal:m.dcal||0}); } }
  return out;
},
logRecent(i){ const r=this._recent[i]; if(!r)return;
  this.logEntry({name:r.label,p:r.p,c:r.c,f:r.f,cal:r.cal,plants:r.plants,fish:r.fish,dcal:r.dcal||0}); },
logCombo(i){ const cb=PREGYM_COMBOS[i]; const t=comboTotals(cb);
  this.logEntry({name:cb.name,...t}); },

trayPick(i,size,qty){ const f=[...COMPONENTS,...S.foods][i]; this.closeSheet();

trayAdd(name,size,qty){ const it=this.tray[name]||(this.tray[name]={qty:0,size:"M"});
  it.qty+=qty||1; if(size)it.size=size; this.render(); },
trayItems(){ return Object.entries(this.tray).filter(([,it])=>it.qty>0)

trayTotals(){ return this.trayItems().reduce((a,it)=>{const e=compEntry(it);

trayRemove(idx){ const it=this.trayItems()[idx]; if(!it)return;

vTray(){ const items=this.trayItems(); if(!items.length) return "";

trayLog(){ const items=this.trayItems(); if(!items.length)return;

      if(best)bench.push({date:w.date,v:Math.round(best)}); } }
  // weekly workout counts, last 8 weeks

   G("Fuel",
    "<b>QUICK ADD</b> is a tray: tap everything you just ate (search box finds it fast — 'choc', 'coco'), it stacks up ON DECK, then one LOG commits it all as a single meal. It echoes into the Repeat row, so tomorrow the same snack is one tap. Leaving the tab logs whatever's on deck automatically — nothing gets lost.<br><br>"+
    "<b>BUILD A PLATE</b> for homemade meals: tap + on each component, name it, LOG + SAVE ★ — from then on it's one tap in the Repeat row.<br><br>"+
    "<b>Portions without a scale:</b> S/M/L anchor to your hand — fist of rice ≈ 1 cup, palm of fish ≈ 7 oz, cupped palm of nuts. "+
    "On weigh days use <b>+ custom</b> for exact numbers. Consistency beats precision.<br>"+
    "<b>Targets:</b> protein zone "+S.profile.proteinFloor+"–"+S.profile.proteinTarget+"g (anywhere in it is a green day), ~"+S.profile.calTarget+" cal, "+S.profile.plantTarget+" plant servings, fish 2×/week, water through the day.")+
   G("Recovery score",
    "90–100 push progression · 70–89 train normal · under 70 volume drops, intensity stays. "+
    "Sleep of 5.5–6h scores <b>full credit</b> — that's your working baseline, not a failure.")+
   G("The weekly review (COACH tab)",
    "Reads your weight trend, waist, strength direction, and eating for the week, then gives ONE verdict: stay the course, or a ±150 calorie nudge you apply with one tap. "+
    "Never crash-cut. It also shows what you've been eating and where protein slipped.")+
   G("Your data",
    "Every save now writes to <b>two</b> storage systems, and the HOME footer shows a live ✓ with your day/workout counts — if saving ever fails you get a red banner, never silent loss. "+
    "SET UP → EXPORT JSON once a week is still your insurance (the coach reminds you) — the file restores everything via IMPORT on any device.");
  openSheet('<div class="eyebrow">Manual</div><h2 class="big" style="font-size:26px">How to use FORGE</h2>'+
   '<div class="small faint">The whole system is ~90 seconds of input a day. Here is the loop.</div>'+
   sections+
   '<button class="btn" style="margin-top:18px" onclick="app.closeSheet()">GOT IT</button>');
},

/* ---------- settings ---------- */
settings(){
  const P=S.profile;
  openSheet(`<div class="eyebrow">Settings · FORGE v${VERSION}</div><h2 class="big" style="font-size:24px">Targets & data</h2>
   <div class="grid2">
     <div><label class="f">Protein zone low (g)</label><input id="sPF" type="number" value="${P.proteinFloor}"></div>
     <div><label class="f">Protein zone high (g)</label><input id="sP" type="number" value="${P.proteinTarget}"></div>
     <div><label class="f">Calories/day</label><input id="sC" type="number" value="${P.calTarget}"></div>
     <div><label class="f">Water (oz/day)</label><input id="sW" type="number" value="${P.waterTarget}"></div>
     <div><label class="f">Rest timer (sec)</label><input id="sR" type="number" value="${P.restSec}"></div>
     <div><label class="f">Goal weight low</label><input id="sGL" type="number" value="${P.goalLow}"></div>
     <div><label class="f">Goal weight high</label><input id="sGH" type="number" value="${P.goalHigh}"></div>
     <div><label class="f">Training hour (0–23)</label><input id="sTH" type="number" min="0" max="23" value="${P.trainHour}"></div>
     <div><label class="f">Plants/day target</label><input id="sPL" type="number" value="${P.plantTarget}"></div>
   </div>
   <label class="f">Scheduled training days — tap to toggle (missions run any day; these get the ${trainLabel()} pill + pre-gym fuel)</label>
   <div style="display:flex;gap:6px;flex-wrap:wrap">
     ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map((d,i)=>
       `<button class="chip ${(P.trainDays||[]).includes(i)?"on":""}" onclick="app.toggleTrainDay(${i},this)">${d}</button>`).join("")}
   </div>
   <button class="btn sm" style="margin-top:16px" onclick="app.saveSettings()">SAVE</button>
   <button class="btn ghost sm" style="margin-top:10px" onclick="app.guide()">HOW TO USE FORGE</button>
   <hr class="divline">
   <div class="eyebrow">Backup</div>
   <div class="grid2" style="margin-top:10px">
     <button class="btn ghost sm" onclick="app.exportData()">EXPORT JSON</button>
     <button class="btn ghost sm" onclick="document.getElementById('impF').click()">IMPORT</button>
   </div>
   <input type="file" id="impF" accept=".json" style="display:none" onchange="app.importData(this)">
   <div class="small faint" style="margin-top:10px">Data is double-written to two storage systems on this device${storePersisted===true?" and iOS has granted persistent storage":storePersisted===false?", but iOS has NOT guaranteed persistence — export weekly":""}. Last export: ${S.meta.lastExport?fmtDate(S.meta.lastExport):"never"}.</div>
   <button class="btn ghost sm" style="margin-top:16px;color:var(--bad)" onclick="app.resetAll()">RESET ALL DATA</button>`);
},
toggleTrainDay(i,el){ const td=S.profile.trainDays=S.profile.trainDays||[2,3,4];
  const j=td.indexOf(i); if(j<0) td.push(i); else td.splice(j,1); td.sort((a,b)=>a-b);
  save(); el.classList.toggle("on"); },
saveSettings(){
  const P=S.profile;
  P.proteinFloor=+document.getElementById("sPF").value||160;
  P.proteinTarget=+document.getElementById("sP").value||185;
  if(P.proteinFloor>P.proteinTarget){ const x=P.proteinFloor; P.proteinFloor=P.proteinTarget; P.proteinTarget=x; }
  P.calTarget=+document.getElementById("sC").value||2700;
  P.waterTarget=+document.getElementById("sW").value||96;
  P.restSec=+document.getElementById("sR").value||90;
  P.goalLow=+document.getElementById("sGL").value||170;
  P.goalHigh=+document.getElementById("sGH").value||180;
  P.trainHour=Math.min(23,Math.max(0,+document.getElementById("sTH").value||15));
  P.plantTarget=+document.getElementById("sPL").value||4;
  save(); this.closeSheet(); this.render(); toast("Saved");
},
exportData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="forge-backup-"+today()+".json"; a.click(); URL.revokeObjectURL(a.href);
  S.meta.lastExport=today(); save(); toast("Backup exported — save it to Files/iCloud");
},
importData(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(!d.profile||!d.workouts) throw 0;
    S=d; save(); this.closeSheet(); this.render(); toast("Imported"); }
    catch(e){ toast("Import failed — not a FORGE backup"); } };
  rd.readAsText(f);
},
resetAll(){ if(confirm("Erase ALL FORGE data? Export first!")&&confirm("Really erase everything?")){
  S=fresh(); save(); this.closeSheet(); this.render(); } },

closeSheet(){ document.getElementById("shade").style.display="none";
  document.getElementById("sheet").style.display="none"; }
};

/* ---------- helpers ---------- */
function openSheet(html){ document.getElementById("sheetBody").innerHTML=html;
  document.getElementById("shade").style.display="block";
  document.getElementById("sheet").style.display="block"; }
let toastT;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.style.display="block";
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display="none",2200); }
function chart(pts,opts){
  if(!pts.length) return `<div class="small faint" style="margin-top:8px">No data yet.</div>`;
  const W=340,H=110,pad=26;
  const vs=pts.map(p=>p.v);
  let lo=Math.min(...vs),hi=Math.max(...vs);
  if(opts.goalLow!=null){ lo=Math.min(lo,opts.goalLow); hi=Math.max(hi,opts.goalHigh); }
  if(hi-lo<4){ hi+=2; lo-=2; }
  const X=i=>pts.length===1?W/2:pad+(W-pad*2)*i/(pts.length-1);
  const Y=v=>H-18-(H-34)*(v-lo)/(hi-lo);
  let band="";
  if(opts.goalLow!=null){ const y1=Y(opts.goalHigh),y2=Y(opts.goalLow);
    band=`<rect x="${pad}" y="${y1}" width="${W-pad*2}" height="${y2-y1}" fill="rgba(143,201,120,.09)"/>`; }
  const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
  const last=pts[pts.length-1];
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    ${band}
    <polyline points="${line}" fill="none" stroke="var(--ember)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="${i===pts.length-1?4:2.5}"
      fill="${i===pts.length-1?"var(--hot)":"var(--ember)"}"/>`).join("")}
    <text x="${pad}" y="${H-4}" font-size="9" fill="var(--faint)">${fmtDate(pts[0].date)}</text>
    <text x="${W-pad}" y="${H-4}" font-size="9" fill="var(--faint)" text-anchor="end">${fmtDate(last.date)}</text>
    <text x="${X(pts.length-1).toFixed(1)}" y="${(Y(last.v)-8).toFixed(1)}" font-size="11" font-weight="700"
      fill="var(--hot)" text-anchor="middle">${last.v}</text>
  </svg>`;
}

load();
app.render();
if(S.active) app.tab="train", app.render();
bootStorage();
// second shot at protected storage: browsers grant persist() more readily
// after a real user gesture than at boot. Render is deferred so the tap
// that triggered this still lands on its button.
window.addEventListener("pointerdown",function once(){
  window.removeEventListener("pointerdown",once);
  if(!(navigator.storage&&navigator.storage.persist)) return;
  navigator.storage.persist().then(async g=>{
    const before=storePersisted;
    try{ storePersisted=g||await navigator.storage.persisted(); }catch(e){}
    if(storePersisted!==before) setTimeout(()=>app.render(),600);
  }).catch(()=>{});
});
</script>
